name: genome-firewall
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # --- bioinformatics tools ---
  - ncbi-amrfinderplus>=3.12
  - cd-hit
  - mmseqs2
  - mash
  # --- data / ML ---
  - pandas
  - numpy
  - pyarrow
  - scikit-learn>=1.3
  - scipy
  - matplotlib
  - biopython
  - pyyaml
  - tqdm
  - joblib
  # --- app + utils ---
  - streamlit
  - requests
  - pip
  - pip:
      - openai>=1.0        # optional LLM prose layer
      # DL stretch (uncomment if doing Phase 8 on a GPU box):
      # - torch
      # - transformers
      # - einops
